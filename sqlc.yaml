version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/schema/schema.sql"
    gen:
      go:
        package: "queries"
        out: "internal/database/queries"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
        emit_methods_with_db_argument: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
