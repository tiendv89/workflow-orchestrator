name: Integration Tests

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main", "feature/**"]

jobs:
  e2e:
    name: E2E coexistence test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: workflow_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/workflow_e2e?sslmode=disable"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./... -count=1

      - name: Run E2E integration tests
        run: go test ./test/e2e/... -tags integration -v -count=1 -timeout 120s
